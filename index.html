<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humai — Sống Biết Ơn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Lora:ital,wght@0,600;1,400&display=swap" rel="stylesheet">

<!-- ==========================================
     HUMAI — MẠNG XÃ HỘI SỐNG BIẾT ƠN
     Prototype v1 · Chủ đề: Khu vườn

     HƯỚNG DẪN TRIỂN KHAI:
     1. Mở file này trên trình duyệt (Chrome/Firefox/Edge)
     2. Để Souly AI hoạt động: cần backend proxy riêng
        (xem phần CONFIG bên dưới — thay API_ENDPOINT)
     3. Hiện tại chạy offline hoàn toàn (trừ Souly AI)

     CẤU TRÚC FILE:
     - PHẦN 1: CSS / Design System (Chủ đề Khu vườn)
     - PHẦN 2: HTML Layout
     - PHẦN 3: JavaScript (State & Logic)
     - PHẦN 4: SVG Garden Rendering
     - PHẦN 5: Page Renderers (8 trang)
     - PHẦN 6: Souly AI Chat
     ========================================== -->

<style>
/* =========================================
   PHẦN 1: DESIGN SYSTEM — CHỦ ĐỀ KHU VƯỜN
   ========================================= */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* Màu chủ đạo — Khu vườn */
  --leaf:        #4A9B6F;
  --leaf-light:  #6DC28A;
  --leaf-pale:   #A8D8B2;
  --leaf-bg:     #EAF5EE;
  --sky:         #E8F4F0;
  --sky2:        #D4EDE7;
  --bark:        #8B6040;
  --bark-dark:   #6B4A30;
  --grass:       #7CB87A;
  --petal-pink:  #F4A7B9;
  --petal-amber: #FBBF7C;
  --petal-blue:  #A8D4F5;

  /* Màu vàng / điểm */
  --gold:        #E8B84B;
  --gold-dark:   #8B5E0A;
  --gold-pale:   #FEF6E4;
  --gold-border: #F0D87A;

  /* Text */
  --text-dark:   #2D4A3E;
  --text-mid:    #4A6B5A;
  --text-soft:   #7A9A8A;

  /* Backgrounds */
  --bg-page:     #F2F8F4;
  --bg-card:     #FFFFFF;
  --bg-input:    #F8FCF9;

  /* Borders */
  --border:      #D4E8DA;
  --border-mid:  #B8D8C4;

  /* Layout */
  --sidebar-w:   230px;
  --topbar-h:    58px;
  --radius:      14px;
  --radius-sm:   9px;
  --shadow:      0 2px 14px rgba(45, 74, 62, 0.08);
  --shadow-md:   0 6px 24px rgba(45, 74, 62, 0.12);
}

html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg-page); color: var(--text-dark); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-w); background: var(--bg-card);
  border-right: 1.5px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0;
  height: 100vh; overflow-y: auto; z-index: 200;
}
.main { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  height: var(--topbar-h); background: var(--bg-card);
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; position: sticky; top: 0; z-index: 100;
}
.page-content { padding: 24px; max-width: 900px; }
.page-full { height: calc(100vh - var(--topbar-h)); display: flex; flex-direction: column; }
.hidden { display: none !important; }

/* ── Logo ── */
.logo-wrap { padding: 20px 18px 15px; border-bottom: 1px solid var(--border); }
.logo-row { display: flex; align-items: center; gap: 9px; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 11px;
  background: var(--leaf); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-name { font-family: 'Lora', serif; font-size: 20px; color: var(--text-dark); font-weight: 600; }
.logo-tagline { font-size: 10px; color: var(--text-soft); font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase; margin-top: 2px; }

/* ── Nav ── */
.nav { padding: 8px 0; flex: 1; }
.nav-section { padding: 10px 18px 4px; font-size: 9.5px; color: var(--text-soft); font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 18px; cursor: pointer;
  transition: all 0.18s; font-size: 13px;
  color: var(--text-mid); font-weight: 600;
  border-left: 3px solid transparent; margin: 1px 0;
  user-select: none;
}
.nav-item:hover { background: var(--leaf-bg); color: var(--leaf); border-left-color: var(--leaf-light); }
.nav-item.active { background: var(--leaf-bg); color: var(--leaf); border-left-color: var(--leaf); font-weight: 700; }
.nav-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--gold); color: #fff;
  font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700;
}

/* ── Me strip ── */
.me-strip { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 9px; }
.me-name { font-size: 12.5px; font-weight: 700; color: var(--text-dark); }
.me-pts { font-size: 11px; color: var(--gold-dark); font-weight: 700; margin-top: 1px; }

/* ── Avatar ── */
.av {
  border-radius: 50%; background: var(--leaf);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; flex-shrink: 0; cursor: pointer;
}
.av-lg { width: 64px; height: 64px; font-size: 22px; }
.av-md { width: 38px; height: 38px; font-size: 14px; }
.av-sm { width: 30px; height: 30px; font-size: 10.5px; }
.av-xs { width: 24px; height: 24px; font-size: 8.5px; }

/* ── Topbar ── */
.topbar-title { font-size: 14.5px; font-weight: 700; color: var(--text-dark); }
.pts-pill {
  background: var(--gold-pale); color: var(--gold-dark);
  padding: 5px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  border: 1px solid var(--gold-border);
}

/* ── Cards ── */
.card {
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 18px 20px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 10.5px; font-weight: 700; color: var(--text-soft);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;
}
.card-green { background: #F2FBF5; border-color: var(--leaf-pale); }
.card-gold { background: var(--gold-pale); border-color: var(--gold-border); }

/* ── Grid ── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 12px; }
.grid-plants { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 12px; }

/* ── Spacing helpers ── */
.mb-8  { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-20 { margin-top: 20px; }

/* ── Flex helpers ── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-c { align-items: center; }
.items-start { align-items: flex-start; }
.jbet { justify-content: space-between; }
.jcen { justify-content: center; }
.gap-6  { gap: 6px; }
.gap-8  { gap: 8px; }
.gap-10 { gap: 10px; }
.gap-12 { gap: 12px; }
.w-full { width: 100%; }
.flex-1 { flex: 1; }
.flex-wrap { flex-wrap: wrap; }

/* ── Typography ── */
.text-xs   { font-size: 11px; }
.text-sm   { font-size: 12.5px; }
.text-base { font-size: 13.5px; }
.text-soft { color: var(--text-soft); }
.text-mid  { color: var(--text-mid); }
.text-leaf { color: var(--leaf); }
.text-gold { color: var(--gold-dark); }
.font-bold { font-weight: 700; }
.font-800  { font-weight: 800; }
.serif     { font-family: 'Lora', serif; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-green  { background: #E6F4EB; color: #266B3A; }
.badge-gold   { background: var(--gold-pale); color: var(--gold-dark); }
.badge-teal   { background: #E1F5F0; color: #0A6B50; }
.badge-soft   { background: #F0F8F3; color: var(--text-mid); }
.badge-red    { background: #FEF0F0; color: #8B3030; }
.badge-blue   { background: #EEF4FF; color: #1A4C8C; }

/* ── Status dot ── */
.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.s-online  { background: #4CAF50; }
.s-away    { background: #FFB300; }
.s-offline { background: #B0BEC5; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.18s; border: none;
  font-family: 'Nunito', sans-serif; white-space: nowrap;
  user-select: none;
}
.btn-leaf   { background: var(--leaf); color: #fff; }
.btn-leaf:hover { background: var(--leaf-light); }
.btn-gold   { background: var(--gold); color: #fff; }
.btn-gold:hover { filter: brightness(1.08); }
.btn-outline { background: transparent; color: var(--leaf); border: 1.5px solid var(--leaf); }
.btn-outline:hover { background: var(--leaf-bg); }
.btn-sm  { padding: 6px 13px; font-size: 12px; border-radius: 7px; }
.btn-xs  { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.btn-w   { width: 100%; justify-content: center; }

/* ── Forms ── */
input, textarea, select {
  font-family: 'Nunito', sans-serif; font-size: 13px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 12px; width: 100%;
  background: var(--bg-input); color: var(--text-dark);
  transition: border 0.18s; outline: none;
}
input:focus, textarea:focus, select:focus { border-color: var(--leaf); background: var(--bg-card); }
textarea { resize: vertical; min-height: 88px; line-height: 1.6; }
label { font-size: 11.5px; font-weight: 700; color: var(--text-soft); display: block; margin-bottom: 5px; }
.form-group { margin-bottom: 12px; }

/* ── Garden hero ── */
.garden-hero {
  background: var(--sky); border-radius: 18px;
  overflow: hidden; border: 1.5px solid var(--sky2);
  margin-bottom: 20px;
}
.garden-hero svg { display: block; }

/* ── Progress bar ── */
.progress { background: #E4EEE7; border-radius: 8px; height: 5px; overflow: hidden; }
.progress-fill { background: var(--leaf); height: 100%; border-radius: 8px; transition: width 0.5s ease; }
.progress-gold { background: var(--gold); }

/* ── Task item ── */
.task-item {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 13px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--bg-card);
  margin-bottom: 7px; transition: all 0.18s; cursor: pointer;
}
.task-item:hover { border-color: var(--leaf-light); background: #F4FBF6; }
.task-item.done { opacity: 0.42; pointer-events: none; }
.task-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border); display: flex;
  align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s; cursor: pointer;
  font-size: 11px; font-weight: 700; color: transparent;
}
.task-check.on { background: var(--leaf); border-color: var(--leaf); color: #fff; }
.task-nudge { font-size: 11px; color: var(--leaf); font-weight: 600; margin-top: 2px; }
.task-pts   { font-size: 11.5px; font-weight: 700; color: var(--gold-dark); white-space: nowrap; }

/* ── Plant card ── */
.plant-card {
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 14px 12px; text-align: center;
  cursor: pointer; transition: all 0.2s;
}
.plant-card:hover { border-color: var(--leaf-light); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.plant-svg-wrap { height: 90px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 8px; }
.plant-name { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 3px; }
.plant-desc { font-size: 10.5px; color: var(--text-soft); margin-bottom: 6px; }
.plant-pts  { font-size: 10.5px; color: var(--text-soft); font-weight: 600; margin-top: 4px; }

/* ── Feed ── */
.feed-item { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
.feed-actions { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.feed-action {
  font-size: 12px; color: var(--text-soft); cursor: pointer;
  padding: 4px 9px; border-radius: 7px;
  transition: background 0.18s; font-weight: 600;
}
.feed-action:hover { background: var(--leaf-bg); color: var(--leaf); }

/* ── Journal ── */
.journal-entry {
  border-left: 3px solid var(--leaf-light);
  padding: 11px 14px; border-radius: 0 10px 10px 0;
  background: #F4FBF6; margin-bottom: 10px;
}
.j-date  { font-size: 10.5px; color: var(--text-soft); margin-bottom: 3px; font-weight: 600; }
.j-mood  { font-size: 12px; font-weight: 700; color: var(--leaf); margin-bottom: 5px; }
.j-text  { font-size: 13px; line-height: 1.65; color: var(--text-mid); }

/* ── Shop tile ── */
.shop-tile {
  background: var(--bg-card); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 15px 12px; text-align: center;
  cursor: pointer; transition: all 0.2s;
}
.shop-tile:hover { border-color: var(--gold-border); transform: translateY(-2px); box-shadow: var(--shadow-md); }
.shop-emoji  { font-size: 34px; display: block; margin-bottom: 7px; }
.shop-name   { font-size: 12px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
.shop-price  { font-size: 12px; font-weight: 700; color: var(--gold-dark); }
.shop-stock  { font-size: 10.5px; color: var(--text-soft); margin: 3px 0 9px; }

/* ── User row ── */
.user-row {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; border-radius: 10px;
  cursor: pointer; transition: background 0.18s;
  border: 1px solid transparent;
}
.user-row:hover { background: #F4FBF6; border-color: var(--border); }

/* ── Doc row ── */
.doc-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border: 1.5px solid var(--border);
  border-radius: 10px; margin-bottom: 8px;
  background: var(--bg-card);
}

/* ── AI hint ── */
.ai-hint {
  background: var(--leaf-bg); border-left: 3px solid var(--leaf-light);
  border-radius: 0 9px 9px 0; padding: 10px 13px;
  font-size: 12.5px; color: var(--text-mid); line-height: 1.65;
}
.ai-hint b { color: var(--leaf); }

/* ── Stat tile ── */
.stat-tile {
  background: #F8FBF8; border-radius: 10px;
  padding: 12px; text-align: center;
}
.stat-num   { font-size: 22px; font-weight: 800; line-height: 1; }
.stat-label { font-size: 10.5px; color: var(--text-soft); margin-top: 3px; font-weight: 600; }

/* ── Chat ── */
.chat-header {
  padding: 13px 20px; background: var(--leaf-bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 11px;
  flex-shrink: 0;
}
.souly-av {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--leaf); display: flex; align-items: center;
  justify-content: center; color: #fff; font-size: 18px; flex-shrink: 0;
}
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; gap: 8px; max-width: 82%; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }
.msg-bubble { padding: 10px 14px; border-radius: 13px; font-size: 13px; line-height: 1.65; }
.msg.ai   .msg-bubble { background: var(--leaf-bg); color: var(--text-dark); border-bottom-left-radius: 4px; }
.msg.user .msg-bubble { background: var(--leaf); color: #fff; border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: var(--text-soft); margin-top: 3px; }
.chat-input-row {
  padding: 13px 18px; border-top: 1px solid var(--border);
  display: flex; gap: 9px; align-items: flex-end;
  background: var(--bg-card); flex-shrink: 0;
}
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--leaf); animation: blink 1.3s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.22s; }
.typing-dot:nth-child(3) { animation-delay: 0.44s; }
@keyframes blink { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35);
  z-index: 1000; display: flex; align-items: center; justify-content: center;
  animation: fadein 0.18s ease;
}
.modal-box {
  background: var(--bg-card); border-radius: 18px;
  padding: 26px 28px; width: 480px; max-width: calc(100vw - 32px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.18);
  animation: popIn 0.2s ease;
}
.modal-title { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; color: var(--text-dark); margin-bottom: 16px; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
@keyframes popIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* ── Mood selector ── */
.mood-chip {
  padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid var(--border); cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--text-mid);
  transition: all 0.18s; user-select: none;
}
.mood-chip.sel { background: var(--leaf); color: #fff; border-color: var(--leaf); }

/* ── Notification ── */
.notif {
  position: fixed; top: 18px; right: 18px;
  background: var(--leaf); color: #fff;
  padding: 11px 18px; border-radius: 11px;
  font-size: 13px; font-weight: 700; z-index: 9999;
  box-shadow: 0 4px 18px rgba(74,155,111,0.38);
  animation: slideIn 0.28s ease;
}
@keyframes slideIn { from { transform: translateX(80px); opacity: 0; } to { transform: none; opacity: 1; } }

/* ── Leaderboard ── */
.rank-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
}
.rank-row:last-child { border-bottom: none; }
.rank-num { width: 24px; text-align: center; font-weight: 800; }

/* ── Responsive: mobile ── */
@media (max-width: 720px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.26s; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .topbar { padding: 0 14px; }
  .page-content { padding: 14px; }
  .hamburger { display: flex !important; }
}
.hamburger {
  display: none; width: 36px; height: 36px;
  flex-direction: column; justify-content: center; gap: 5px;
  cursor: pointer; padding: 6px;
}
.hamburger span { display: block; height: 2px; background: var(--text-dark); border-radius: 2px; transition: all 0.2s; }
.mobile-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.3); z-index: 150;
}
.mobile-overlay.show { display: block; }
</style>
</head>

<!-- ==========================================
     PHẦN 2: HTML LAYOUT
     ========================================== -->
<div class="app" id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="logo-wrap">
      <div class="logo-row">
        <div class="logo-icon">
          <!-- Leaf icon -->
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2C10 2 5.5 5.5 5.5 11C5.5 13.76 7.5 16 10 16C12.5 16 14.5 13.76 14.5 11C14.5 5.5 10 2 10 2Z" fill="white" opacity="0.95"/>
            <path d="M10 8V16" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M10 11L8 9" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M10 12.5L12 10.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>

function fmtPts(n) { return n.toLocaleString('vi-VN'); }

function addPoints(delta, reason) {
  S.pts += delta;
  const label = '✦ ' + fmtPts(S.pts) + ' điểm';
  document.getElementById('me-pts').textContent = label;
  document.getElementById('pts-topbar').textContent = label;
  S.tx.push({ date: new Date().toLocaleDateString('vi-VN'), d: delta, r: reason });
  showToast((delta > 0 ? '+' + delta : delta) + ' điểm — ' + reason);
}

function showToast(msg, isError = false) {
  document.querySelectorAll('.notif').forEach(e => e.remove());
  const n = document.createElement('div');
  n.className = 'notif';
  if (isError) n.style.background = '#C04040';
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 3200);
}

function openModal(html) {
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('mobile-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show');
}

  document.getElementById('sidebar').classList.remove('open');

function svgTree(x, y, h, c1, c2, c3) {
  const tw = 8;
  return `<rect x="${x - tw/2}" y="${y - h*0.38}" width="${tw}" height="${h*0.38}" rx="3" fill="#8B6040"/>
  <ellipse cx="${x}" cy="${y - h*0.82}" rx="${h*0.46}" ry="${h*0.38}" fill="${c3}" opacity="0.65"/>
  <ellipse cx="${x-10}" cy="${y - h*0.65}" rx="${h*0.37}" ry="${h*0.3}" fill="${c1}" opacity="0.9"/>
  <ellipse cx="${x+12}" cy="${y - h*0.7}" rx="${h*0.34}" ry="${h*0.28}" fill="${c2}" opacity="0.85"/>
  <ellipse cx="${x}" cy="${y - h*0.95}" rx="${h*0.28}" ry="${h*0.23}" fill="${c2}" opacity="0.78"/>`;
}
function svgSapling(x, y, h, c1, c2) {
  return `<line x1="${x}" y1="${y}" x2="${x}" y2="${y-h}" stroke="#8B6040" stroke-width="2.2" stroke-linecap="round"/>
  <ellipse cx="${x-7}" cy="${y-h*0.6}" rx="9" ry="6.5" fill="${c1}" opacity="0.85"/>
  <ellipse cx="${x+6}" cy="${y-h*0.78}" rx="8" ry="5.5" fill="${c2}" opacity="0.8"/>`;
}
function svgFlower(x, y, col, cc) {
  return `<line x1="${x}" y1="${y}" x2="${x}" y2="${y-28}" stroke="#5A9E58" stroke-width="2" stroke-linecap="round"/>
  <circle cx="${x}" cy="${y-30}" r="7" fill="${col}" opacity="0.9"/>
  <circle cx="${x}" cy="${y-30}" r="3.2" fill="${cc}"/>`;
}
function svgBush(x, y, col) {
  return `<ellipse cx="${x}" cy="${y}" rx="20" ry="13" fill="${col}" opacity="0.75"/>
  <ellipse cx="${x-13}" cy="${y+3}" rx="13" ry="9.5" fill="${col}" opacity="0.65"/>
  <ellipse cx="${x+13}" cy="${y+3}" rx="13" ry="9.5" fill="${col}" opacity="0.65"/>`;
}
function svgCloud(x, y) {
  return `<ellipse cx="${x}" cy="${y}" rx="26" ry="14" fill="white" opacity="0.68"/>
  <ellipse cx="${x-17}" cy="${y+4}" rx="17" ry="11" fill="white" opacity="0.58"/>
  <ellipse cx="${x+17}" cy="${y+4}" rx="19" ry="12" fill="white" opacity="0.63"/>`;
}
function svgSun(x, y, r) {
  let rays = '';
  for (let i = 0; i < 8; i++) {
    const a = i * 45 * Math.PI / 180;
    rays += `<line x1="${(x + Math.cos(a)*(r+3)).toFixed(1)}" y1="${(y + Math.sin(a)*(r+3)).toFixed(1)}" x2="${(x + Math.cos(a)*(r+9)).toFixed(1)}" y2="${(y + Math.sin(a)*(r+9)).toFixed(1)}" stroke="#E8B84B" stroke-width="2" stroke-linecap="round"/>`;
  }
  return `<circle cx="${x}" cy="${y}" r="${r}" fill="#F4D47A" opacity="0.9"/>${rays}`;
}
function svgMtn(x, y, w, h, col) {
  return `<polygon points="${x},${y} ${x+w/2},${y-h} ${x+w},${y}" fill="${col}" opacity="0.28"/>`;
}
function svgBird(x, y) {
  return `<path d="M${x} ${y} Q${x-8} ${y-6} ${x-15} ${y}" stroke="#5A7A6A" stroke-width="1.4" fill="none"/>
  <path d="M${x} ${y} Q${x+8} ${y-6} ${x+15} ${y}" stroke="#5A7A6A" stroke-width="1.4" fill="none"/>`;
}

function gardenSceneSVG(W = 660, H = 220) {
  const gY = Math.floor(H * 0.72);
  let s = `<svg width="100%" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  s += `<rect width="${W}" height="${H}" fill="#E8F4F0"/>`;
  s += `<rect y="${gY - 10}" width="${W}" height="${H - gY + 10}" fill="#C4E4B8"/>`;
  s += `<rect y="${gY + 10}" width="${W}" height="${H - gY - 10}" fill="#B4D8A4"/>`;
  s += svgMtn(W*0.04, gY, W*0.28, H*0.52, '#9AC8A0');
  s += svgMtn(W*0.68, gY, W*0.30, H*0.42, '#98B890');
  s += svgSun(W*0.88, H*0.15, 16);
  s += svgCloud(W*0.22, H*0.2);
  s += svgCloud(W*0.62, H*0.13);
  s += svgBird(W*0.42, H*0.11);
  s += svgBird(W*0.50, H*0.08);
  // Trees
  s += svgTree(55,  gY, 92, '#4A9B6F', '#7CC89A', '#2D6B4A');
  s += svgTree(580, gY, 76, '#5A8E5F', '#88C878', '#2A5A38');
  s += svgTree(130, gY, 52, '#6DC28A', '#9ADBA8', '#3A8A5A');
  s += svgTree(490, gY, 56, '#58A870', '#7DCCA0', '#2E6A42');
  // Bushes
  s += svgBush(310, gY, '#7CC8A0');
  s += svgBush(210, gY, '#88D4A0');
  // Saplings
  s += svgSapling(220, gY, 42, '#5A9E58', '#88C878');
  s += svgSapling(370, gY, 46, '#4A9B6F', '#7CC89A');
  s += svgSapling(430, gY, 36, '#68B078', '#90D0A0');
  // Flowers
  [[168,gY,'#F4A7B9','#FFD054'],[295,gY,'#FBBF7C','#E87C3C'],
   [338,gY,'#B0D4F8','#FFD054'],[458,gY,'#F4A7B9','#FFD054'],
   [548,gY,'#C8E0A0','#FFD054']].forEach(([fx,fy,fc,cc]) => s += svgFlower(fx,fy,fc,cc));
  // Ground line
  s += `<line x1="0" y1="${gY}" x2="${W}" y2="${gY}" stroke="#A8C8A0" stroke-width="1" opacity="0.5"/>`;
  s += '</svg>';
  return s;
}

function plantSVG(prog, colArr) {
  const W = 100, H = 92, gY = H - 14;
  const [c1, c2, c3, c4] = colArr;
  let s = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  const x = W / 2;
  if (prog < 20) {
    s += `<circle cx="${x}" cy="${gY-4}" r="5" fill="${c1}" opacity="0.7"/>`;
    s += `<line x1="${x}" y1="${gY}" x2="${x}" y2="${gY-8}" stroke="${c1}" stroke-width="2"/>`;
  } else if (prog < 45) {
    const h = 28 + prog * 0.35;
    s += svgSapling(x, gY, h, c1, c2);
    if (prog > 30) s += svgFlower(x + 5, gY - h + 3, c3, c4);
  } else if (prog < 75) {
    const h = 44 + prog * 0.38;
    s += `<rect x="${x-4}" y="${gY-h*0.36}" width="8" height="${h*0.36}" rx="3" fill="#8B6040"/>`;
    s += `<ellipse cx="${x}" cy="${gY-h*0.77}" rx="${h*0.4}" ry="${h*0.33}" fill="${c1}" opacity="0.72"/>`;
    s += `<ellipse cx="${x-8}" cy="${gY-h*0.62}" rx="${h*0.33}" ry="${h*0.27}" fill="${c2}" opacity="0.9"/>`;
    s += `<ellipse cx="${x+9}" cy="${gY-h*0.67}" rx="${h*0.3}" ry="${h*0.25}" fill="${c2}" opacity="0.82"/>`;
    s += svgFlower(x-11, gY-h*0.27, c3, c4);
  } else {
    const h = 62 + prog * 0.12;
    s += `<rect x="${x-5}" y="${gY-h*0.38}" width="10" height="${h*0.38}" rx="4" fill="#7A5030"/>`;
    s += `<ellipse cx="${x}" cy="${gY-h*0.83}" rx="${h*0.46}" ry="${h*0.38}" fill="${c1}" opacity="0.68"/>`;
    s += `<ellipse cx="${x-12}" cy="${gY-h*0.67}" rx="${h*0.37}" ry="${h*0.3}" fill="${c2}" opacity="0.88"/>`;
    s += `<ellipse cx="${x+13}" cy="${gY-h*0.73}" rx="${h*0.34}" ry="${h*0.28}" fill="${c1}" opacity="0.82"/>`;
    s += `<ellipse cx="${x}" cy="${gY-h*0.96}" rx="${h*0.27}" ry="${h*0.22}" fill="${c2}" opacity="0.78"/>`;
    s += svgFlower(x-15, gY-h*0.32, c3, c4);
    s += svgFlower(x+12, gY-h*0.27, c3, c4);
  }
  s += `<rect y="${gY}" width="${W}" height="${H-gY}" fill="#C8D8B0" opacity="0.45"/>`;
  s += '</svg>';
  return s;
}

function completeTask(id) {
  const task = S.tasks.find(t => t.id === id);
  if (!task || task.done) return;
  task.done = true;
  addPoints(task.pts, 'Hoàn thành: ' + task.title);
  const remaining = S.tasks.filter(t => !t.done).length;
  const nb = document.getElementById('nb-tasks');
  if (nb) nb.textContent = remaining > 0 ? remaining : '';
  const pl = S.plants[Math.floor(Math.random() * S.plants.length)];
  pl.prog = Math.min(100, pl.prog + 5); pl.pts += task.pts; pl.tasks++;
  S.feed.unshift({ id: 'f' + Date.now(), user: { name: S.user.name, ini: S.user.initials, col: '#4A9B6F' }, action: 'hoàn thành nhiệm vụ', detail: `"${task.title}"`, pts: '+' + task.pts, time: 'Vừa xong', likes: 0 });
  renderTasks();
}

        <div class="flex flex-col gap-6">
          <button class="btn btn-gold btn-xs" onclick="openGiftTo('${u.id}')">🌿 Tặng</button>
          <button class="btn btn-outline btn-xs" onclick="viewUserProfile('${u.id}')">Xem</button>
        </div>
      </div>
    `).join('')}

    <div class="card-title mt-20">Khám phá (${discover.length})</div>
    ${discover.map(u => `
      <div class="user-row">
        <div class="av av-sm" style="background:${u.color}">${u.initials}</div>
        <div class="flex-1">
          <div class="text-base font-bold">${u.name}</div>
          <div class="text-xs text-soft">${u.bio}</div>
          <div class="mt-8"><span class="badge badge-soft">${u.persona}</span></div>
        </div>
        <button class="btn btn-leaf btn-xs" onclick="addFriend('${u.id}', this)">+ Kết bạn</button>
      </div>
    `).join('')}`;
}

function addFriend(id, btn) {
  const u = S.users.find(x => x.id === id);
  if (!u) return;
  u.friend = true; S.user.friendCount++;
  btn.closest('.user-row').remove();
  showToast('Đã kết bạn với ' + u.name + '!');
}

function openGiftTo(id) {
  const u = S.users.find(x => x.id === id);
  openModal(`
    <div class="modal-title">🌿 Tặng điểm cho ${u.name}</div>
    <div class="form-group">
      <label>Số điểm</label>
      <input type="number" id="gt-amt" value="50" min="1" max="${S.pts}">
    </div>
    <div class="form-group">
      <label>Lời nhắn biết ơn</label>
      <textarea id="gt-msg" placeholder="Cảm ơn bạn vì..."></textarea>
    </div>
    <div class="flex gap-8 jbet">
      <button class="btn btn-outline" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-gold" onclick="confirmGiftTo('${id}')">Tặng ngay 🎁</button>
    </div>
  `);
}

function confirmGiftTo(id) {
  const amt = parseInt(document.getElementById('gt-amt').value);
  const msg = document.getElementById('gt-msg').value || 'Tặng bạn nhé!';
  const u = S.users.find(x => x.id === id);
  if (!amt || amt > S.pts) { showToast('Không đủ điểm!', true); return; }
  addPoints(-amt, 'Tặng điểm cho ' + u.name);
  u.pts += amt;
  S.feed.unshift({ id: 'f' + Date.now(), user: { name: S.user.name, ini: S.user.initials, col: '#4A9B6F' }, action: 'tặng điểm cho', detail: `${u.name}: "${msg}"`, pts: '-' + amt, time: 'Vừa xong', likes: 0 });
  closeModal(); showToast('Đã tặng ' + amt + ' điểm cho ' + u.name + '!');
}

function viewUserProfile(id) {
  const u = S.users.find(x => x.id === id);
  const statusLabel = { online: 'Trực tuyến', away: 'Vắng mặt', offline: 'Ngoại tuyến' };
  openModal(`
    <div style="text-align:center">
      <div class="av av-lg" style="margin:0 auto 12px;background:${u.color}">${u.initials}</div>
      <div class="modal-title" style="text-align:center">${u.name}</div>
      <div class="text-sm text-soft mb-12">${u.bio}</div>
      <div class="flex jcen flex-wrap gap-6 mb-16">
        <span class="badge badge-gold">✦ ${fmtPts(u.pts)}</span>
        <span class="badge badge-teal">${u.persona}</span>
        <span class="badge badge-${u.status === 'online' ? 'green' : 'soft'}">${statusLabel[u.status]}</span>
      </div>
      <button class="btn btn-gold btn-w" onclick="openGiftTo('${u.id}');closeModal()">🌿 Tặng điểm</button>
    </div>
  `);
}

/* ── CHAT (Souly AI) ── */
function renderChat() {
  const p = document.getElementById('page-chat');
  p.innerHTML = `
    <div class="chat-header">
      <div class="souly-av">🌱</div>
      <div class="flex-1">
        <div style="font-weight:700;font-size:13.5px">Souly</div>
        <div class="text-xs text-leaf">Trợ lý AI của Humai · Luôn sẵn sàng lắng nghe</div>
      </div>
      <div class="status-dot s-online"></div>
    </div>
    <div class="chat-messages" id="chat-msgs">
      <div class="msg ai">
        <div class="souly-av" style="width:30px;height:30px;font-size:14px;flex-shrink:0">🌱</div>
        <div>
          <div class="msg-bubble">Xin chào! Tôi là Souly 🌿<br><br>Tôi có thể tư vấn về văn hóa doanh nghiệp, quy trình nội bộ, hoặc đồng hành cùng bạn trong hành trình sống biết ơn. Bạn muốn nói về điều gì hôm nay?</div>
          <div class="msg-time">Souly · ${new Date().toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      </div>
      ${S.chat.map(renderChatBubble).join('')}
    </div>
    <div class="chat-input-row">
      <textarea id="chat-input"
        style="min-height:42px;max-height:110px;resize:none;flex:1"
        placeholder="Nhắn tin với Souly..."
        onkeydown="handleChatEnter(event)"></textarea>
      <button class="btn btn-leaf" style="height:42px;align-self:flex-end" onclick="sendChat()">Gửi ↑</button>
    </div>`;
}

function renderChatBubble(m) {
  return `<div class="msg ${m.r}">
    ${m.r === 'ai' ? '<div class="souly-av" style="width:30px;height:30px;font-size:14px;flex-shrink:0">🌱</div>' : ''}
    <div>
      <div class="msg-bubble">${m.c.replace(/\n/g, '<br>')}</div>
      <div class="msg-time">${m.r === 'ai' ? 'Souly' : 'Bạn'} · ${m.t}</div>
    </div>
    ${m.r === 'user' ? '<div class="av av-xs" style="flex-shrink:0">AN</div>' : ''}
  </div>`;
}

function handleChatEnter(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  if (S.chatBusy) return;
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  const now = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  S.chat.push({ r: 'user', c: text, t: now });

  const msgs = document.getElementById('chat-msgs');
  const uEl = document.createElement('div');
  uEl.innerHTML = renderChatBubble({ r: 'user', c: text, t: now });
  msgs.appendChild(uEl.firstChild);

  // Typing indicator
  const thinkEl = document.createElement('div');
  thinkEl.className = 'msg ai'; thinkEl.id = 'chat-thinking';
  thinkEl.innerHTML = `
    <div class="souly-av" style="width:30px;height:30px;font-size:14px;flex-shrink:0">🌱</div>
    <div class="msg-bubble flex gap-6" style="padding:12px 16px">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>`;
  msgs.appendChild(thinkEl);
  msgs.scrollTop = msgs.scrollHeight;
  S.chatBusy = true;

  // Build context
  const ragList   = S.rag.filter(d => d.status === 'indexed').map(d => d.name).join(', ');
  const recentJ   = S.journals.slice(0, 2).map(j => `[${j.date}] ${j.mood}: "${j.text.slice(0, 90)}"`).join('\n');
  const systemPrompt = `Bạn là Souly — trợ lý AI thân thiện, ấm áp của mạng xã hội Humai, nền tảng khuyến khích lối sống biết ơn và tử tế.

THÔNG TIN NGƯỜI DÙNG:
- Tên: ${S.user.name}
- Điểm biết ơn: ${fmtPts(S.pts)}
- Streak: ${S.user.streak} ngày liên tiếp
- Persona: ${S.user.persona}

NHẬT KÝ GẦN ĐÂY:
${recentJ}

KHO TRI THỨC RAG (tài liệu có thể tham chiếu):
${ragList}

NHIỆM VỤ:
1. Tư vấn về văn hóa doanh nghiệp / quy trình nội bộ dựa trên tài liệu RAG
2. Khuyến khích hành vi biết ơn và tử tế
3. Lắng nghe, đồng cảm và hỗ trợ tâm lý
4. Gợi ý nhiệm vụ phù hợp với người dùng

PHONG CÁCH: Ấm áp, chân thành, ngắn gọn (≤130 từ trừ khi cần thiết), tiếng Việt tự nhiên, emoji nhẹ nhàng.`;

  const apiMessages = S.chat.map(m => ({ role: m.r === 'ai' ? 'assistant' : 'user', content: m.c }));

  try {
    const res = await fetch(CONFIG.API_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: CONFIG.MODEL,
        max_tokens: CONFIG.MAX_TOKENS,
        system: systemPrompt,
        messages: apiMessages,
      }),
    });

    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Xin lỗi, có lỗi xảy ra. Bạn thử lại nhé!';

    document.getElementById('chat-thinking')?.remove();
    const aTime = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    S.chat.push({ r: 'ai', c: reply, t: aTime });
    const aEl = document.createElement('div');
    aEl.innerHTML = renderChatBubble({ r: 'ai', c: reply, t: aTime });
    msgs.appendChild(aEl.firstChild);
    msgs.scrollTop = msgs.scrollHeight;
  } catch (err) {
    document.getElementById('chat-thinking')?.remove();
    const errEl = document.createElement('div');
    errEl.innerHTML = renderChatBubble({ r: 'ai', c: 'Souly đang bận, bạn thử lại sau nhé 🌿\n\n(Lưu ý: Để Souly hoạt động, cần cấu hình backend proxy API — xem phần CONFIG trong file HTML)', t: 'Lỗi' });
    msgs.appendChild(errEl.firstChild);
    msgs.scrollTop = msgs.scrollHeight;
  }
  S.chatBusy = false;
}

/* ── RAG ── */
function renderRAG() {
  const p = document.getElementById('page-rag');
  const indexed = S.rag.filter(d => d.status === 'indexed').length;
  p.innerHTML = `
    <div class="flex jbet mb-20">
      <div class="text-sm text-soft">${indexed} tài liệu sẵn sàng / ${S.rag.length} tổng</div>
      <button class="btn btn-leaf" onclick="openUploadDoc()">+ Tải lên tài liệu</button>
    </div>
    <div class="card mb-20">
      <div class="card-title">Thống kê kho tri thức</div>
      <div class="grid-2">
        <div>
          <div class="text-xs text-soft mb-8">Dung lượng sử dụng</div>
          <div class="progress mb-8"><div class="progress-fill" style="width:42%"></div></div>
          <div class="text-xs text-soft">4.2 GB / 10 GB (42%)</div>
        </div>
        <div>
          <div class="text-xs text-soft mb-8">Vector embeddings</div>
          <div style="font-size:22px;font-weight:800;color:var(--leaf)">12,847</div>
          <div class="text-xs text-soft">chunks đã lập chỉ mục</div>
        </div>
      </div>
      <div class="ai-hint mt-12"><b>Souly:</b> Hãy hỏi tôi về văn hoá công ty, quy trình onboarding, hay chính sách phúc lợi!</div>
    </div>
    <div class="card-title">Tài liệu đã nạp</div>
    ${S.rag.map(d => `
      <div class="doc-row">
        <div style="font-size:22px;width:30px;text-align:center">${d.type === 'pdf' ? '📄' : d.type === 'docx' ? '📝' : '📊'}</div>
        <div class="flex-1">
          <div class="text-base font-bold">${d.name}</div>
          <div class="text-xs text-soft">${d.type.toUpperCase()} · ${d.size} · ${d.date}</div>
          ${d.status === 'indexing'
            ? `<div class="progress mt-8"><div class="progress-fill progress-gold" style="width:62%"></div></div>`
            : ''}
        </div>
        <span class="badge ${d.status === 'indexed' ? 'badge-green' : 'badge-gold'}">
          ${d.status === 'indexed' ? '✓ Sẵn sàng' : '⏳ Đang xử lý'}
        </span>
      </div>
    `).join('')}`;
}

function openUploadDoc() {
  openModal(`
    <div class="modal-title">📤 Tải lên tài liệu mới</div>
    <div style="border:2px dashed var(--border);border-radius:12px;padding:30px;text-align:center;cursor:pointer;background:var(--bg-input)" onclick="document.getElementById('doc-file-input').click()">
      <div style="font-size:38px;margin-bottom:8px">📄</div>
      <div class="text-base font-bold text-mid">Click để chọn file</div>
      <div class="text-xs text-soft">Hỗ trợ: PDF, DOCX, XLSX, TXT</div>
      <input type="file" id="doc-file-input" style="display:none" accept=".pdf,.docx,.xlsx,.txt" onchange="handleDocFile(this)">
    </div>
    <div id="doc-preview" style="display:none;margin-top:10px">
      <div class="doc-row">
        <div style="font-size:22px">📄</div>
        <div><div id="doc-fname" class="text-base font-bold"></div><div id="doc-fsize" class="text-xs text-soft"></div></div>
      </div>
    </div>
    <div class="flex gap-8 jbet mt-16">
      <button class="btn btn-outline" onclick="closeModal()">Huỷ</button>
      <button class="btn btn-leaf" onclick="confirmUpload()">📤 Tải lên & Lập chỉ mục</button>
    </div>
  `);
}

function handleDocFile(inp) {
  const f = inp.files[0]; if (!f) return;
  document.getElementById('doc-fname').textContent = f.name;
  document.getElementById('doc-fsize').textContent = (f.size / 1024 / 1024).toFixed(1) + ' MB';
  document.getElementById('doc-preview').style.display = 'block';
}

function confirmUpload() {
  const inp = document.getElementById('doc-file-input');
  if (!inp.files[0]) { showToast('Vui lòng chọn file!', true); return; }
  const f = inp.files[0];
  const ext = f.name.split('.').pop().toLowerCase();
  S.rag.unshift({ id: 'd' + Date.now(), name: f.name, type: ext, size: (f.size / 1024 / 1024).toFixed(1) + ' MB', date: new Date().toLocaleDateString('vi-VN'), status: 'indexing' });
  closeModal();
  showToast('Đang lập chỉ mục tài liệu...');
  setTimeout(() => {
    if (S.rag[0]) S.rag[0].status = 'indexed';
    showToast('Tài liệu đã sẵn sàng cho Souly!');
    if (S.currentPage === 'rag') renderRAG();
  }, 3000);
  renderRAG();
}

/* ── PROFILE ── */

  const u = S.user;

  document.getElementById('page-profile').innerHTML = `
    <div class="grid-2 mb-20" style="align-items:start">
      <div class="card" style="text-align:center">
        <div class="av av-lg" style="margin:0 auto 12px">${u.initials}</div>
        <div style="font-size:19px;font-weight:800">${u.name}</div>
        <div class="text-sm text-soft" style="margin:5px 0 10px">${u.bio}</div>
        <div class="flex jcen flex-wrap gap-6 mb-12">
          <span class="badge badge-green">${u.level}</span>
          <span class="badge badge-teal">${u.persona}</span>
        </div>
        <div class="flex jcen flex-wrap gap-6 mb-16">
          ${u.skills.map(s => `<span class="badge badge-soft">${s}</span>`).join('')}
        </div>
        <button class="btn btn-outline btn-sm" onclick="openEditProfile()">✏️ Chỉnh sửa hồ sơ</button>
      </div>
      <div>
        <div class="card mb-12">
          <div class="card-title">Thống kê cá nhân</div>
          <div class="grid-2 gap-8">
            ${[
              { n: fmtPts(S.pts), l: 'Tổng điểm', c: 'var(--leaf)' },
              { n: u.streak, l: 'Ngày liên tiếp', c: 'var(--gold-dark)' },
              { n: u.friendCount, l: 'Bạn bè', c: '#5A8EAF' },
              { n: u.journalCount, l: 'Nhật ký', c: '#9A7AC8' },

              <div class="stat-tile">

                <div class="stat-label">${x.l}</div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="card">
          <div class="card-title">AI phân tích hành vi</div>
          <div class="text-sm mb-8"><b>Phân loại:</b> <span class="badge badge-teal">${u.persona}</span></div>
          <div class="text-sm mb-8"><b>Điểm mạnh:</b> Chia sẻ · Kết nối · Lắng nghe</div>
          <div class="ai-hint">Bạn có xu hướng lan toả năng lượng tích cực. Hãy thử đảm nhiệm vai trò mentor cho thành viên mới!</div>
        </div>
      </div>
    </div>

    <div class="card-title">Bảng xếp hạng cộng đồng</div>
    <div class="card">
      ${ranked.map((u, i) => `

            ${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1}
          </div>
          <div class="av av-xs" style="background:${u.color || '#4A9B6F'}">${u.initials}</div>
          <div class="flex-1 text-sm" style="font-weight:${u.isMe ? 700 : 500}">
            ${u.name}${u.isMe ? ' <span class="badge badge-green" style="font-size:10px;padding:2px 7px">Bạn</span>' : ''}
          </div>
          <div class="text-sm font-bold text-gold">✦ ${fmtPts(u.pts)}</div>
        </div>

function openEditProfile() {
  const u = S.user;
  openModal(`
    <div class="modal-title">✏️ Chỉnh sửa hồ sơ</div>
    <div class="form-group">
      <label>Tên hiển thị</label>
      <input id="ep-name" value="${u.name}">
    </div>

      <label>Trạng thái</label>

      <textarea id="ep-bio">${u.bio}</textarea>

function saveProfile() {
  S.user.name   = document.getElementById('ep-name').value.trim() || S.user.name;

  S.user.bio    = document.getElementById('ep-bio').value.trim();

}

// Init badge count
document.getElementById('nb-tasks').textContent = S.tasks.filter(t => !t.done).length;

// First render
renderFeed();
</script>
